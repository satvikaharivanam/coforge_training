spring.application.name=SB-EMS-SERVICE
# this the embedded tomcat port number
server.port=1111

#database connection properties 
# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/c
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

ems.save.successInsert="SUCCESS : Employee Details Inserted"
ems.db.fail="FAILED : DB Error"
#ems.save.fail="FAILED : Invalid Employee details"
ems.save.successUpdate="SUCCESS : Employee Details Updated"
ems.delete.successDelete="SUCCESS : Employee Details Deleted"
ems.invalid.emp-notfound="FAILED : Employee Details Not Found"
ems.invalid.emp-details="FAILED : Invalid Employee details"


eureka.instance.hostname=localhost

#Stop registering as a client. It is a Server
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true