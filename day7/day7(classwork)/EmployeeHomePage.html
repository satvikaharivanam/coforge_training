<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Employee Management System</title>
<link href="EMSStyle.css" rel="stylesheet">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

</head>
<body>
	<div class="Header">
		<h1>Employee Management System</h1>
	</div>
	<br>
	<div class="Content">
		<table>
			<tr>
				<td>Employee ID</td>
				<td><input type="text"></td>
			</tr>
			<tr>
				<td>Employee Name</td>
				<td><input type="password"></td>
			</tr>
			<tr>
				<td>Employee Salary</td>
				<td><input type="text"></td>
			</tr>
			<tr>
				<td>Department Number</td>
				<td><input type="password"></td>
			</tr>
		</table>
		<br>
		<input type="Submit", value = "Insert" class = "btn-primary">
		&nbsp;&nbsp;
		<input type="Submit", value = "Delete" class = "btn-danger">
		&nbsp;&nbsp;
		<input type="Submit", value = "Update" class = "btn-warning">
		&nbsp;&nbsp;
		<input type="Submit", value = "Find" class = "btn-success">
		&nbsp;&nbsp;
		<input type="Submit", value = "FindAll" class = "btn-info">
		<br>
	</div>
</body>
</html>
