<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Bootstrap Grid System</title>
<link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
<style type = "text/css">
.container {
  max-width: 600px;
  margin: auto;
}
</style>
</head>
<body>

<div class="container text-center mt-4">

  <div class="row mb-3">
    <div class="col-12 bg-primary p-3 rounded-5 text-dark fw-bold">Header</div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-md-4">
      <div class="bg-success p-5 rounded-5 text-dark fw-bold">Column 1</div>
    </div>
    <div class="col-md-4">
      <div class="bg-danger p-5 rounded-5 text-dark fw-bold">Column 2</div>
    </div>
    <div class="col-md-4">
      <div class="bg-warning p-5 rounded-5 text-dark fw-bold">Column 3</div>
    </div>
  </div>

  <div class="row">
    <div class="col-12 bg-info p-2 rounded-5 text-dark fw-bold">Footer</div>
  </div>

</div>

</body>
</html>
