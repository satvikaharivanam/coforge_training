<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script type="text/javascript">

// this is internal java script file 
	function sayWelcome(){
		document.write("<b><font color = 'green'> Welcome to javascrip</font></b>");
		// pre defined object in js referring the web page 
		// displays on the browser
	}
	
	function sayHello(){
		var name = "satvika";
		alert("say hello "+name);
		// to make up a popup 
	}
	
	
	
	// we can call an function from js in html with help of event
</script>
</head>
<body>
  <!--  onclick is an java script function that is used in html  -->
  <!-- inline JS -->
	<button onclick = "sayWelcome()">welcome</button>
	<button onclick = "sayHello()">hello</button>
</body>

</html>
