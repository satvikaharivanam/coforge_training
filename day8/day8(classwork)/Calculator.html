<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<script type="text/javascript">
	function calculate(operator){
		var n1 = parseInt(document.getElementById("n1").value); // document is a dom (document object model) element 
		var n2 = parseInt(document.getElementById("n2").value);
		var r = "";
		if(operator === "add"){
			r = "Addition : "+ (n1+n2);
		}else if(operator === "sub"){
			r = "Subtraction : "+ (n1-n2);
		}else if(operator === "mul"){
			r = "Multiplication : "+ (n1*n2);
		}else if(operator === "div"){
			r = "Division : "+ (n1/n2);
		}
		
		document.getElementById("resultDiv").innerHTML = "<b>" + r + "</b>";
	}
</script>
<body>
	Enter No1<input type ="number" id = "n1"> 
	Enter No2<input type ="number" id = "n2"> 
	<br>
	<button onclick = "calculate('add')">Addition</button>
	<button onclick = "calculate('sub')">Subtraction</button>
	<button onclick = "calculate('mul')">Multiplication</button>
	<button onclick = "calculate('div')">Division</button>
	<div id = "resultDiv">
	 	
	</div>
	
</body>
</html>
